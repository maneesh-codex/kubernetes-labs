---
# Alternative kind cluster for lab 07 (network policies).
#
# Identical to kind/cluster.yaml except that the default CNI is disabled so
# Calico can be installed in its place.
#
# WHY THIS EXISTS: kind's default CNI, kindnet, does not implement
# NetworkPolicy. Policies applied to a default kind cluster are accepted by the
# API server and then silently ignored - which is the worst possible failure
# mode for learning, because everything looks like it worked.
#
# Usage:
#   make cluster-up-calico
# or, by hand:
#   kind create cluster --name k8s-labs --config kind/cluster-calico.yaml
#   kubectl create -f https://raw.githubusercontent.com/projectcalico/calico/v3.28.2/manifests/tigera-operator.yaml
#   kubectl create -f https://raw.githubusercontent.com/projectcalico/calico/v3.28.2/manifests/custom-resources.yaml
#
# Note that nodes stay NotReady until Calico is running - that is expected, not
# a failure. With no CNI installed there is no pod networking at all.
kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
name: k8s-labs

networking:
  # 192.168.0.0/16, NOT the 10.244.0.0/16 used by kind/cluster.yaml. This is
  # Calico's default IPv4 pool as shipped in custom-resources.yaml; matching it
  # here avoids having to patch the Installation CR after the fact. A mismatch
  # produces pods that get an IP but cannot route, which is a miserable thing to
  # debug.
  podSubnet: "192.168.0.0/16"
  serviceSubnet: "10.96.0.0/16"
  # The one meaningful difference from kind/cluster.yaml.
  disableDefaultCNI: true
  kubeProxyMode: "iptables"

nodes:
  - role: control-plane
    kubeadmConfigPatches:
      - |
        kind: InitConfiguration
        nodeRegistration:
          kubeletExtraArgs:
            node-labels: "ingress-ready=true"
    extraPortMappings:
      - containerPort: 80
        hostPort: 80
        protocol: TCP
      - containerPort: 443
        hostPort: 443
        protocol: TCP

  - role: worker
    labels:
      topology.kubernetes.io/zone: zone-a
      node-role.kubernetes.io/worker: "worker"

  - role: worker
    labels:
      topology.kubernetes.io/zone: zone-b
      node-role.kubernetes.io/worker: "worker"
