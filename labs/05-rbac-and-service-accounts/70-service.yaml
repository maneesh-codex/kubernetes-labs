---
apiVersion: v1
kind: Service
metadata:
  name: demo-app
  namespace: lab-05-rbac
  labels:
    app.kubernetes.io/name: demo-app
    app.kubernetes.io/instance: lab-05
    app.kubernetes.io/version: "1.0.0"
    app.kubernetes.io/component: backend
    app.kubernetes.io/part-of: kubernetes-labs
    app.kubernetes.io/managed-by: kubectl
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: demo-app
    app.kubernetes.io/instance: lab-05
  ports:
    - name: http
      port: 80
      # Targeting the port by NAME rather than number means the Service keeps
      # working if the container port ever moves.
      targetPort: http
      protocol: TCP
