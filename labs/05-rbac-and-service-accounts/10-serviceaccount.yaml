---
# The identity our workload runs as. Every Pod runs as *some* ServiceAccount;
# if you do not name one you silently inherit `default`, which is shared by
# every other workload in the namespace and therefore impossible to audit.
# Naming an SA per workload is the single highest-value RBAC habit.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: demo-app
  namespace: lab-05-rbac
  labels:
    app.kubernetes.io/name: demo-app
    app.kubernetes.io/instance: lab-05
    app.kubernetes.io/version: "1.0.0"
    app.kubernetes.io/component: backend
    app.kubernetes.io/part-of: kubernetes-labs
    app.kubernetes.io/managed-by: kubectl
  annotations:
    # On EKS this is where IRSA is wired up. The mutating webhook in the EKS
    # control plane sees this annotation and injects AWS_ROLE_ARN plus a
    # projected token at /var/run/secrets/eks.amazonaws.com/serviceaccount/token.
    # Left commented out because a kind cluster has no OIDC provider to trust.
    # eks.amazonaws.com/role-arn: arn:aws:iam::111122223333:role/lab-05-demo-app
    # eks.amazonaws.com/sts-regional-endpoints: "true"
    kubernetes.io/description: >-
      Identity for the lab-05 demo app. Granted namespaced read access to pods
      and configmaps, and cluster-wide read access to nodes.
# We DO want the API token here because the whole point of the lab is calling
# the API from inside the Pod. Set it explicitly either way: an unset field is
# an unmade decision, and the default (true) is the insecure one.
automountServiceAccountToken: true
---
# Identity for the interactive kubectl Pod. It is bound to the same namespaced
# Role plus the built-in `view` ClusterRole, so learners can feel the difference
# between a narrow hand-written Role and a broad curated one.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: kubectl-debug
  namespace: lab-05-rbac
  labels:
    app.kubernetes.io/name: kubectl-debug
    app.kubernetes.io/instance: lab-05
    app.kubernetes.io/version: "1.0.0"
    app.kubernetes.io/component: tooling
    app.kubernetes.io/part-of: kubernetes-labs
    app.kubernetes.io/managed-by: kubectl
  annotations:
    kubernetes.io/description: >-
      Identity for the in-cluster kubectl Pod used to probe RBAC from the
      inside, the way a compromised workload would.
automountServiceAccountToken: true
---
# A deliberately powerless identity, used to demonstrate what "denied" looks
# like. No Role or ClusterRole ever binds to it.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: no-perms
  namespace: lab-05-rbac
  labels:
    app.kubernetes.io/name: no-perms
    app.kubernetes.io/instance: lab-05
    app.kubernetes.io/version: "1.0.0"
    app.kubernetes.io/component: backend
    app.kubernetes.io/part-of: kubernetes-labs
    app.kubernetes.io/managed-by: kubectl
  annotations:
    kubernetes.io/description: >-
      Control identity with zero RBAC bindings. Used to contrast `kubectl auth
      can-i` output against the demo-app ServiceAccount.
# This workload never talks to the API server, so it should not carry a
# credential that can be stolen out of the filesystem by an RCE.
automountServiceAccountToken: false
