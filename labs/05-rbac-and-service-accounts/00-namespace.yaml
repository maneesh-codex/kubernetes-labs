---
apiVersion: v1
kind: Namespace
metadata:
  name: lab-05-rbac
  labels:
    app.kubernetes.io/name: lab-05-rbac
    app.kubernetes.io/instance: lab-05
    app.kubernetes.io/version: "1.0.0"
    app.kubernetes.io/component: namespace
    app.kubernetes.io/part-of: kubernetes-labs
    app.kubernetes.io/managed-by: kubectl
    # Opt the whole namespace into the restricted Pod Security Standard. Every
    # workload below already complies; this makes the compliance enforced rather
    # than merely conventional.
    pod-security.kubernetes.io/enforce: restricted
    pod-security.kubernetes.io/enforce-version: latest
    pod-security.kubernetes.io/audit: restricted
    pod-security.kubernetes.io/warn: restricted
