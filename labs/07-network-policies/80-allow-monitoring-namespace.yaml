---
# namespaceSelector: admitting traffic from OUTSIDE this namespace.
#
# A bare `podSelector` in a `from` block only ever matches Pods in the policy's
# own namespace. To let another namespace in you must supply a
# namespaceSelector - and you should select on a LABEL that expresses intent
# (`purpose: monitoring`) rather than on the namespace name, so the trust
# relationship survives a rename and is grantable by whoever labels namespaces.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-metrics-scrape-from-monitoring
  namespace: lab-07-netpol
  labels:
    app.kubernetes.io/name: allow-metrics-scrape-from-monitoring
    app.kubernetes.io/instance: lab-07
    app.kubernetes.io/version: "1.0.0"
    app.kubernetes.io/component: security
    app.kubernetes.io/part-of: kubernetes-labs
    app.kubernetes.io/managed-by: kubectl
spec:
  # Every tier exposes /metrics, so let the scraper reach all of them.
  podSelector: {}
  policyTypes:
    - Ingress
  ingress:
    - from:
        # AND-ed: "Pods labelled tier=scraper, inside namespaces labelled
        # purpose=monitoring". Both selectors in ONE list item. Split them into
        # two items and you would additionally admit every Pod in the monitoring
        # namespace - and every scraper-labelled Pod cluster-wide.
        - namespaceSelector:
            matchLabels:
              netpol.kubernetes-labs.io/purpose: monitoring
          podSelector:
            matchLabels:
              netpol.kubernetes-labs.io/tier: scraper
      ports:
        - protocol: TCP
          port: 8080
        # The database tier serves /metrics on 5432 in this lab (see 30-*.yaml).
        - protocol: TCP
          port: 5432
    # An `matchExpressions` variant, showing the richer selector syntax. This
    # second `from` block is OR-ed with the first: either rule admits traffic.
    - from:
        - namespaceSelector:
            matchExpressions:
              - key: netpol.kubernetes-labs.io/purpose
                operator: In
                values: ["monitoring", "observability"]
          podSelector:
            matchExpressions:
              - key: netpol.kubernetes-labs.io/tier
                operator: In
                values: ["scraper", "tracing-collector"]
      ports:
        - protocol: TCP
          port: 8080
---
# A Pod in the monitoring namespace that plays the part of Prometheus. It has
# no NetworkPolicy in its own namespace, so its egress is unrestricted - the
# only thing gating it is the ingress policy above.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: scraper
  namespace: lab-07-netpol-monitoring
  labels:
    app.kubernetes.io/name: scraper
    app.kubernetes.io/instance: lab-07
    app.kubernetes.io/version: "1.0.0"
    app.kubernetes.io/component: monitoring
    app.kubernetes.io/part-of: kubernetes-labs
    app.kubernetes.io/managed-by: kubectl
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: scraper
      app.kubernetes.io/instance: lab-07
  template:
    metadata:
      labels:
        app.kubernetes.io/name: scraper
        app.kubernetes.io/instance: lab-07
        app.kubernetes.io/version: "1.0.0"
        app.kubernetes.io/component: monitoring
        app.kubernetes.io/part-of: kubernetes-labs
        app.kubernetes.io/managed-by: kubectl
        netpol.kubernetes-labs.io/tier: scraper
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        runAsGroup: 65532
        fsGroup: 65532
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: scraper
          # busybox for wget. Runs fine as an arbitrary non-root UID.
          image: busybox:1.36
          imagePullPolicy: IfNotPresent
          command: ["/bin/sh", "-c"]
          args:
            - |
              while true; do
                for target in \
                  "http://backend.lab-07-netpol.svc.cluster.local:8080/metrics" \
                  "http://database.lab-07-netpol.svc.cluster.local:5432/metrics"; do
                  if wget -q -O /dev/null -T 5 "$target"; then
                    echo "scrape OK   $target"
                  else
                    echo "scrape FAIL $target"
                  fi
                done
                sleep 15
              done
          env:
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
          livenessProbe:
            exec:
              command: ["/bin/true"]
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 2
            failureThreshold: 3
          readinessProbe:
            exec:
              command: ["/bin/true"]
            initialDelaySeconds: 3
            periodSeconds: 5
            timeoutSeconds: 2
            failureThreshold: 3
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir:
            medium: Memory
            sizeLimit: 16Mi
