---
# FIXED 10 - readOnlyRootFilesystem vs an app that writes to disk
#
# Changes from broken/10-readonly-rootfs.yaml:
#   - readOnlyRootFilesystem stays TRUE. That was never the bug.
#   - Added emptyDir volumes mounted at every path the process writes to:
#     /var/run (pid file), /var/log/app (logs), /tmp (scratch).
#
# Choosing the volume medium:
#   medium: Memory  -> tmpfs. Never touches disk, so nothing survives a restart
#                      and nothing can be forensically recovered from the node.
#                      Counts against the container's MEMORY LIMIT (see scenario
#                      07), so always set sizeLimit below that limit.
#   medium: ""      -> node disk (the kubelet's ephemeral storage). Use for
#                      anything larger than a few tens of MiB, and pair it with
#                      ephemeral-storage requests/limits so a runaway writer
#                      cannot fill the node and trigger DiskPressure evictions
#                      for every other Pod on it.
#
# The better fix, where you control the application: do not write to disk at
# all. Log to stdout and let the node's log agent ship it - a container writing
# its own log files is a container whose logs you will lose on eviction, and it
# is the single most common reason teams give for disabling this flag.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: broken-10-readonly-fs
  namespace: lab-11-troubleshooting
  labels:
    app.kubernetes.io/name: broken-10-readonly-fs
    app.kubernetes.io/instance: lab-11
    app.kubernetes.io/version: "1.0.0"
    app.kubernetes.io/component: backend
    app.kubernetes.io/part-of: kubernetes-labs
    app.kubernetes.io/managed-by: kubectl
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: broken-10-readonly-fs
      app.kubernetes.io/instance: lab-11
  template:
    metadata:
      labels:
        app.kubernetes.io/name: broken-10-readonly-fs
        app.kubernetes.io/instance: lab-11
        app.kubernetes.io/version: "1.0.0"
        app.kubernetes.io/component: backend
        app.kubernetes.io/part-of: kubernetes-labs
        app.kubernetes.io/managed-by: kubectl
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        runAsGroup: 65532
        # fsGroup makes the kubelet chown the emptyDir volumes to GID 65532, so
        # the non-root process can actually write to them. Without it, a mounted
        # volume can be root-owned and you trade EROFS for EACCES - a different
        # error, same outcome.
        fsGroup: 65532
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: app
          image: busybox:1.36
          imagePullPolicy: IfNotPresent
          command: ["/bin/sh", "-c"]
          args:
            - |
              echo "starting; writing pidfile and opening log"
              echo $$ > /var/run/app.pid
              mkdir -p /var/log/app
              echo "$(date -Iseconds) started" >> /var/log/app/app.log
              # Mirror to stdout as well - this is what a log agent collects.
              echo "$(date -Iseconds) started (stdout)"
              touch /tmp/ready
              exec sleep infinity
          env:
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
              ephemeral-storage: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
              ephemeral-storage: 256Mi
          startupProbe:
            exec:
              command: ["/bin/sh", "-c", "test -f /tmp/ready"]
            periodSeconds: 2
            timeoutSeconds: 2
            failureThreshold: 30
          livenessProbe:
            exec:
              command: ["/bin/sh", "-c", "test -f /var/run/app.pid"]
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 2
            failureThreshold: 3
          readinessProbe:
            exec:
              command: ["/bin/sh", "-c", "test -f /tmp/ready"]
            initialDelaySeconds: 3
            periodSeconds: 5
            timeoutSeconds: 2
            failureThreshold: 3
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            - name: var-run
              mountPath: /var/run
            - name: var-log
              mountPath: /var/log/app
            - name: tmp
              mountPath: /tmp
      volumes:
        # Small and ephemeral: tmpfs is ideal.
        - name: var-run
          emptyDir:
            medium: Memory
            sizeLimit: 4Mi
        # Logs can grow, so back them with node disk rather than RAM - a tmpfs
        # log directory that fills up gets the container OOMKilled.
        - name: var-log
          emptyDir:
            sizeLimit: 128Mi
        - name: tmp
          emptyDir:
            medium: Memory
            sizeLimit: 16Mi
