---
# FIXED 08 - missing ConfigMap / Secret
#
# Changes from broken/08-missing-configmap-secret.yaml:
#   - Created the ConfigMap `demo-app-settings`, the Secret
#     `demo-app-credentials`, and the ConfigMap `demo-app-extra-config`.
#   - Marked the non-essential ConfigMap reference `optional: true`, which turns
#     a hard failure into a silently-absent env var. Use this ONLY for genuinely
#     optional configuration - `optional: true` on something the app requires
#     converts a clear CreateContainerConfigError into a confusing runtime bug.
#
# Ordering matters when applying by hand: `kubectl apply -f` on a directory
# sorts by filename, so a Deployment can be created before its ConfigMap. It
# will sit in CreateContainerConfigError for a few seconds and then self-heal
# once the ConfigMap appears - the kubelet retries. Helm's hooks and Argo CD's
# sync waves exist to make this deterministic.
apiVersion: v1
kind: ConfigMap
metadata:
  name: demo-app-settings
  namespace: lab-11-troubleshooting
  labels:
    app.kubernetes.io/name: broken-08-missing-config
    app.kubernetes.io/instance: lab-11
    app.kubernetes.io/version: "1.0.0"
    app.kubernetes.io/component: backend
    app.kubernetes.io/part-of: kubernetes-labs
    app.kubernetes.io/managed-by: kubectl
data:
  GREETING: "lab-11 scenario 08 - configuration resolved correctly."
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: demo-app-extra-config
  namespace: lab-11-troubleshooting
  labels:
    app.kubernetes.io/name: broken-08-missing-config
    app.kubernetes.io/instance: lab-11
    app.kubernetes.io/version: "1.0.0"
    app.kubernetes.io/component: backend
    app.kubernetes.io/part-of: kubernetes-labs
    app.kubernetes.io/managed-by: kubectl
data:
  config.yaml: |
    feature_flags:
      verbose_logging: false
---
apiVersion: v1
kind: Secret
metadata:
  name: demo-app-credentials
  namespace: lab-11-troubleshooting
  labels:
    app.kubernetes.io/name: broken-08-missing-config
    app.kubernetes.io/instance: lab-11
    app.kubernetes.io/version: "1.0.0"
    app.kubernetes.io/component: backend
    app.kubernetes.io/part-of: kubernetes-labs
    app.kubernetes.io/managed-by: kubectl
type: Opaque
# stringData is plaintext in the manifest and base64-encoded by the API server.
# In a real repository this value would come from AWS Secrets Manager via the
# External Secrets Operator or the Secrets Store CSI driver - never from Git.
# The app only ever exposes a non-reversible fingerprint of it.
stringData:
  api-key: "lab-11-not-a-real-secret"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: broken-08-missing-config
  namespace: lab-11-troubleshooting
  labels:
    app.kubernetes.io/name: broken-08-missing-config
    app.kubernetes.io/instance: lab-11
    app.kubernetes.io/version: "1.0.0"
    app.kubernetes.io/component: backend
    app.kubernetes.io/part-of: kubernetes-labs
    app.kubernetes.io/managed-by: kubectl
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: broken-08-missing-config
      app.kubernetes.io/instance: lab-11
  template:
    metadata:
      labels:
        app.kubernetes.io/name: broken-08-missing-config
        app.kubernetes.io/instance: lab-11
        app.kubernetes.io/version: "1.0.0"
        app.kubernetes.io/component: backend
        app.kubernetes.io/part-of: kubernetes-labs
        app.kubernetes.io/managed-by: kubectl
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        runAsGroup: 65532
        fsGroup: 65532
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: demo-app
          image: ghcr.io/maneeshm/k8s-labs-demo:1.0.0
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          envFrom:
            - configMapRef:
                name: demo-app-settings
          env:
            - name: API_KEY
              valueFrom:
                secretKeyRef:
                  name: demo-app-credentials
                  key: api-key
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 2
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 3
            periodSeconds: 5
            timeoutSeconds: 2
            failureThreshold: 3
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            - name: tmp
              mountPath: /tmp
            - name: extra-config
              mountPath: /etc/app
              readOnly: true
      volumes:
        - name: tmp
          emptyDir:
            medium: Memory
            sizeLimit: 16Mi
        - name: extra-config
          configMap:
            name: demo-app-extra-config
            # Genuinely optional: if this ConfigMap is absent the directory is
            # simply empty rather than the Pod failing to start.
            optional: true
