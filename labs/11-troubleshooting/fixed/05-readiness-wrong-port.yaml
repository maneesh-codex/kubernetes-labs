---
# FIXED 05 - readiness probe on the wrong port/path
#
# Changes from broken/05-readiness-wrong-port.yaml:
#   - readinessProbe.path: /health/ready -> /readyz  (what the app serves)
#   - readinessProbe.port: 9090 -> http              (the NAMED port)
#
# The durable fix is the second one. Referring to `port: http` rather than a
# number means the probe follows the container port automatically and can never
# drift from it. Make named ports a review rule; it eliminates this entire bug
# class.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: broken-05-readiness
  namespace: lab-11-troubleshooting
  labels:
    app.kubernetes.io/name: broken-05-readiness
    app.kubernetes.io/instance: lab-11
    app.kubernetes.io/version: "1.0.0"
    app.kubernetes.io/component: backend
    app.kubernetes.io/part-of: kubernetes-labs
    app.kubernetes.io/managed-by: kubectl
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: broken-05-readiness
      app.kubernetes.io/instance: lab-11
  template:
    metadata:
      labels:
        app.kubernetes.io/name: broken-05-readiness
        app.kubernetes.io/instance: lab-11
        app.kubernetes.io/version: "1.0.0"
        app.kubernetes.io/component: backend
        app.kubernetes.io/part-of: kubernetes-labs
        app.kubernetes.io/managed-by: kubectl
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        runAsGroup: 65532
        fsGroup: 65532
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: demo-app
          image: ghcr.io/maneeshm/k8s-labs-demo:1.0.0
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          env:
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 2
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 3
            periodSeconds: 5
            timeoutSeconds: 2
            failureThreshold: 3
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir:
            medium: Memory
            sizeLimit: 16Mi
---
apiVersion: v1
kind: Service
metadata:
  name: broken-05-readiness
  namespace: lab-11-troubleshooting
  labels:
    app.kubernetes.io/name: broken-05-readiness
    app.kubernetes.io/instance: lab-11
    app.kubernetes.io/version: "1.0.0"
    app.kubernetes.io/component: backend
    app.kubernetes.io/part-of: kubernetes-labs
    app.kubernetes.io/managed-by: kubectl
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: broken-05-readiness
    app.kubernetes.io/instance: lab-11
  ports:
    - name: http
      port: 80
      targetPort: http
      protocol: TCP
