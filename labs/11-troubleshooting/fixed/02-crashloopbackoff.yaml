---
# FIXED 02 - CrashLoopBackOff
#
# Changes from broken/02-crashloopbackoff.yaml:
#   - Added the ConfigMap the startup script requires, and mounted it at
#     /etc/app so the existence check passes.
#   - Added a startupProbe. This is the correct tool for "the app needs a while
#     to come up": it suppresses the liveness probe until the app has started,
#     so a slow boot is not mistaken for a hang and restarted into a loop.
apiVersion: v1
kind: ConfigMap
metadata:
  name: broken-02-config
  namespace: lab-11-troubleshooting
  labels:
    app.kubernetes.io/name: broken-02-crashloop
    app.kubernetes.io/instance: lab-11
    app.kubernetes.io/version: "1.0.0"
    app.kubernetes.io/component: backend
    app.kubernetes.io/part-of: kubernetes-labs
    app.kubernetes.io/managed-by: kubectl
data:
  config.yaml: |
    listen: ":8080"
    log_level: info
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: broken-02-crashloop
  namespace: lab-11-troubleshooting
  labels:
    app.kubernetes.io/name: broken-02-crashloop
    app.kubernetes.io/instance: lab-11
    app.kubernetes.io/version: "1.0.0"
    app.kubernetes.io/component: backend
    app.kubernetes.io/part-of: kubernetes-labs
    app.kubernetes.io/managed-by: kubectl
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: broken-02-crashloop
      app.kubernetes.io/instance: lab-11
  template:
    metadata:
      labels:
        app.kubernetes.io/name: broken-02-crashloop
        app.kubernetes.io/instance: lab-11
        app.kubernetes.io/version: "1.0.0"
        app.kubernetes.io/component: backend
        app.kubernetes.io/part-of: kubernetes-labs
        app.kubernetes.io/managed-by: kubectl
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        runAsGroup: 65532
        fsGroup: 65532
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: app
          image: busybox:1.36
          imagePullPolicy: IfNotPresent
          command: ["/bin/sh", "-c"]
          args:
            - |
              echo "starting broken-02 v1.0.0"
              echo "loading configuration from /etc/app/config.yaml"
              if [ ! -f /etc/app/config.yaml ]; then
                echo "FATAL: open /etc/app/config.yaml: no such file or directory" >&2
                exit 1
              fi
              echo "config loaded, ready"
              touch /tmp/ready
              exec sleep infinity
          env:
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
          # startupProbe gates the other two. failureThreshold x periodSeconds
          # (30 x 2 = 60s) is the total time the app is allowed to boot; only
          # after it passes does the liveness probe begin. This is how you give
          # a slow starter room without also making liveness insensitive to a
          # genuine hang later on.
          startupProbe:
            exec:
              command: ["/bin/sh", "-c", "test -f /tmp/ready"]
            periodSeconds: 2
            timeoutSeconds: 2
            failureThreshold: 30
          livenessProbe:
            exec:
              command: ["/bin/sh", "-c", "test -f /tmp/ready"]
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 2
            failureThreshold: 3
          readinessProbe:
            exec:
              command: ["/bin/sh", "-c", "test -f /tmp/ready"]
            initialDelaySeconds: 3
            periodSeconds: 5
            timeoutSeconds: 2
            failureThreshold: 3
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            - name: config
              mountPath: /etc/app
              readOnly: true
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: config
          configMap:
            name: broken-02-config
        - name: tmp
          emptyDir:
            medium: Memory
            sizeLimit: 16Mi
