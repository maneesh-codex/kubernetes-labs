---
# BROKEN SCENARIO 02 - CrashLoopBackOff
#
# The container starts, prints a fatal error, and exits non-zero. The kubelet
# restarts it with exponential backoff (10s, 20s, 40s ... capped at 5m), which
# is why the RESTARTS column climbs while the Pod spends most of its life in
# `CrashLoopBackOff` rather than `Error`.
#
# The single most important habit this scenario teaches: `kubectl logs` shows
# the CURRENT container, which for a crash-looping Pod is usually one that has
# not produced output yet. You want `kubectl logs --previous`.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: broken-02-crashloop
  namespace: lab-11-troubleshooting
  labels:
    app.kubernetes.io/name: broken-02-crashloop
    app.kubernetes.io/instance: lab-11
    app.kubernetes.io/version: "1.0.0"
    app.kubernetes.io/component: backend
    app.kubernetes.io/part-of: kubernetes-labs
    app.kubernetes.io/managed-by: kubectl
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: broken-02-crashloop
      app.kubernetes.io/instance: lab-11
  template:
    metadata:
      labels:
        app.kubernetes.io/name: broken-02-crashloop
        app.kubernetes.io/instance: lab-11
        app.kubernetes.io/version: "1.0.0"
        app.kubernetes.io/component: backend
        app.kubernetes.io/part-of: kubernetes-labs
        app.kubernetes.io/managed-by: kubectl
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        runAsGroup: 65532
        fsGroup: 65532
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: app
          image: busybox:1.36
          imagePullPolicy: IfNotPresent
          # BUG: the command references a config file that was never mounted,
          # and the startup script treats that as fatal. This models the single
          # most common real cause of CrashLoopBackOff - the process starts,
          # fails a startup validation, and exits.
          command: ["/bin/sh", "-c"]
          args:
            - |
              echo "starting broken-02 v1.0.0"
              echo "loading configuration from /etc/app/config.yaml"
              if [ ! -f /etc/app/config.yaml ]; then
                echo "FATAL: open /etc/app/config.yaml: no such file or directory" >&2
                exit 1
              fi
              exec sleep infinity
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          env:
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
          # NOTE: no probes here. A crash-looping container never stays up long
          # enough for a probe to matter, and adding one would only muddy the
          # diagnosis. Probes are a *readiness* tool, not a *startup* tool -
          # that is what startupProbe is for.
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
