---
# BROKEN SCENARIO 08 - missing ConfigMap / Secret -> CreateContainerConfigError
#
# The Pod schedules, the image pulls, and then the kubelet cannot assemble the
# container's configuration because the referenced objects do not exist. Status
# is `CreateContainerConfigError`, and - crucially - `kubectl logs` returns
# nothing at all, because no container was ever created. Reaching for logs first
# here wastes several minutes.
#
# The same failure with a volume mount instead of env produces a different
# status: the Pod sits in `ContainerCreating` with a FailedMount event, and the
# kubelet retries for two minutes before the event even appears.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: broken-08-missing-config
  namespace: lab-11-troubleshooting
  labels:
    app.kubernetes.io/name: broken-08-missing-config
    app.kubernetes.io/instance: lab-11
    app.kubernetes.io/version: "1.0.0"
    app.kubernetes.io/component: backend
    app.kubernetes.io/part-of: kubernetes-labs
    app.kubernetes.io/managed-by: kubectl
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: broken-08-missing-config
      app.kubernetes.io/instance: lab-11
  template:
    metadata:
      labels:
        app.kubernetes.io/name: broken-08-missing-config
        app.kubernetes.io/instance: lab-11
        app.kubernetes.io/version: "1.0.0"
        app.kubernetes.io/component: backend
        app.kubernetes.io/part-of: kubernetes-labs
        app.kubernetes.io/managed-by: kubectl
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        runAsGroup: 65532
        fsGroup: 65532
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: demo-app
          image: ghcr.io/maneeshm/k8s-labs-demo:1.0.0
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          envFrom:
            # BUG 1: no ConfigMap named `demo-app-settings` exists in this
            # namespace. Without `optional: true` this is a hard failure.
            - configMapRef:
                name: demo-app-settings
          env:
            # BUG 2: no Secret named `demo-app-credentials` either. Note that a
            # missing KEY inside an existing Secret fails the same way, with a
            # subtly different message ("couldn't find key ... in Secret").
            - name: API_KEY
              valueFrom:
                secretKeyRef:
                  name: demo-app-credentials
                  key: api-key
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 2
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 3
            periodSeconds: 5
            timeoutSeconds: 2
            failureThreshold: 3
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            - name: tmp
              mountPath: /tmp
            - name: extra-config
              mountPath: /etc/app
              readOnly: true
      volumes:
        - name: tmp
          emptyDir:
            medium: Memory
            sizeLimit: 16Mi
        # BUG 3: a third missing reference, this time as a volume. This is the
        # one that produces `ContainerCreating` + FailedMount rather than
        # CreateContainerConfigError - two failure modes in one Pod, so you can
        # see which one the status field reports first.
        - name: extra-config
          configMap:
            name: demo-app-extra-config
