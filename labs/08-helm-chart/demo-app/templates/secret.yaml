{{- if .Values.secrets -}}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "demo-app.fullname" . }}-secret
  labels:
    {{- include "demo-app.labels" . | nindent 4 }}
type: Opaque
# `stringData` lets Helm write plaintext and lets the API server do the base64
# encoding. It is easier to review in `helm template` output than pre-encoded
# `data`, and base64 was never a security control anyway.
#
# LAB ONLY. In production these values would arrive from AWS Secrets Manager
# via External Secrets Operator, or be committed encrypted as a SealedSecret.
# Anything placed in a Helm value ends up readable in the release Secret and
# in whatever CI system rendered the chart.
stringData:
  {{- range $key, $value := .Values.secrets }}
  {{ $key }}: {{ $value | quote }}
  {{- end }}
{{- end }}
