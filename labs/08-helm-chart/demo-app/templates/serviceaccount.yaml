{{- if .Values.serviceAccount.create -}}
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "demo-app.serviceAccountName" . }}
  labels:
    {{- include "demo-app.labels" . | nindent 4 }}
  {{- with .Values.serviceAccount.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
# Setting this at the ServiceAccount level is defence in depth: even a pod that
# forgets to set automountServiceAccountToken inherits the safe default.
automountServiceAccountToken: {{ .Values.serviceAccount.automount }}
{{- end }}
