---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: demo-app
  labels:
    app.kubernetes.io/name: demo-app
    app.kubernetes.io/instance: lab-10
    app.kubernetes.io/version: "1.0.0"
    app.kubernetes.io/component: web
    app.kubernetes.io/part-of: kubernetes-labs
    app.kubernetes.io/managed-by: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  # Prod-only resource: dev runs a single replica, where any PDB above zero
  # would block node drains outright. This is the clearest example of why
  # overlays add resources rather than just patching them.
  minAvailable: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: demo-app
      app.kubernetes.io/instance: lab-10
