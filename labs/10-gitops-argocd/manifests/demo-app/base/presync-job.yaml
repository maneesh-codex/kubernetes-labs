---
apiVersion: batch/v1
kind: Job
metadata:
  name: demo-app-presync
  labels:
    app.kubernetes.io/name: demo-app
    app.kubernetes.io/instance: lab-10
    app.kubernetes.io/version: "1.0.0"
    app.kubernetes.io/component: presync-hook
    app.kubernetes.io/part-of: kubernetes-labs
    app.kubernetes.io/managed-by: argocd
  annotations:
    # PreSync runs to COMPLETION before Argo applies any of the app's normal
    # resources. If this Job fails, the sync fails and nothing is applied --
    # which is the whole point. The canonical use is a database schema
    # migration: you want the migration to succeed before the new code that
    # depends on it starts rolling out.
    argocd.argoproj.io/hook: PreSync
    # BeforeHookCreation deletes the previous run just before creating this
    # one. Without it the second sync fails outright, because a Job's
    # `spec.template` is immutable and Argo cannot patch the existing object.
    # This is the most common way a hook Job breaks on its second run.
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
    argocd.argoproj.io/sync-wave: "-1"
spec:
  backoffLimit: 2
  # Reap the Job 5 minutes after it finishes so completed hooks do not
  # accumulate. Argo's delete policy handles the next-sync case; this handles
  # the "nobody synced again for a month" case.
  ttlSecondsAfterFinished: 300
  template:
    metadata:
      labels:
        app.kubernetes.io/name: demo-app
        app.kubernetes.io/instance: lab-10
        app.kubernetes.io/component: presync-hook
        app.kubernetes.io/part-of: kubernetes-labs
    spec:
      restartPolicy: Never
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        runAsGroup: 65532
        fsGroup: 65532
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: migrate
          image: busybox:1.36
          imagePullPolicy: IfNotPresent
          command:
            - /bin/sh
            - -c
          args:
            - |
              set -eu
              echo "==> PreSync hook starting in namespace ${POD_NAMESPACE}"
              echo "==> Standing in for a schema migration or a backup."
              echo "==> Exiting non-zero here would ABORT the sync and leave"
              echo "    the previous application version running untouched."
              sleep 5
              echo "==> PreSync complete; Argo CD may now apply the manifests."
          env:
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
