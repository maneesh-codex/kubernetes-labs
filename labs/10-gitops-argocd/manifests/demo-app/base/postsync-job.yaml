---
apiVersion: batch/v1
kind: Job
metadata:
  name: demo-app-postsync
  labels:
    app.kubernetes.io/name: demo-app
    app.kubernetes.io/instance: lab-10
    app.kubernetes.io/version: "1.0.0"
    app.kubernetes.io/component: postsync-hook
    app.kubernetes.io/part-of: kubernetes-labs
    app.kubernetes.io/managed-by: argocd
  annotations:
    # PostSync runs only after every resource in the app reports Healthy --
    # meaning the Deployment has finished rolling out and its pods are Ready.
    # That makes it the right place for a smoke test: the app is genuinely
    # serving by the time this runs.
    #
    # Worth knowing: a failing PostSync marks the sync failed but does NOT roll
    # anything back. For automatic rollback on a failed smoke test you want
    # Argo Rollouts with analysis templates, not a hook.
    argocd.argoproj.io/hook: PostSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
    argocd.argoproj.io/sync-wave: "5"
spec:
  backoffLimit: 2
  ttlSecondsAfterFinished: 300
  template:
    metadata:
      labels:
        app.kubernetes.io/name: demo-app
        app.kubernetes.io/instance: lab-10
        app.kubernetes.io/component: postsync-hook
        app.kubernetes.io/part-of: kubernetes-labs
    spec:
      restartPolicy: Never
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        runAsGroup: 65532
        fsGroup: 65532
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: smoke-test
          image: curlimages/curl:8.11.1
          imagePullPolicy: IfNotPresent
          command:
            - /bin/sh
            - -c
          args:
            - |
              set -eu
              # The Service is reachable as a bare name because the hook runs
              # in the same namespace. This is exactly why the overlays avoid
              # namePrefix -- a prefixed Service would break this hostname.
              URL="http://demo-app:8080"
              echo "==> PostSync smoke test against ${URL}"
              curl --fail --silent --show-error \
                   --retry 10 --retry-delay 3 --retry-connrefused \
                   --max-time 10 "${URL}/healthz"
              echo
              curl --fail --silent --show-error --max-time 10 "${URL}/readyz"
              echo
              echo "==> Verifying the app serves its identity endpoint"
              curl --fail --silent --show-error --max-time 10 "${URL}/api/info"
              echo
              echo "==> Smoke test passed."
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
