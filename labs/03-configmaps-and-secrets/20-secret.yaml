---
# A Secret is a ConfigMap with a different name and slightly better defaults.
# That is not a joke - it is the single most important thing to understand here.
#
# Secret values are stored base64-ENCODED, not encrypted. Anyone with `get
# secrets` RBAC in this namespace can read them in plaintext with one command,
# and by default they sit unencrypted in etcd. What a Secret actually buys you
# over a ConfigMap is:
#   * values are kept out of `kubectl describe` and most log/UI surfaces
#   * separate RBAC verbs, so you can grant configmaps without secrets
#   * the kubelet holds them in tmpfs rather than on node disk when mounted
#   * a hook for etcd envelope encryption (EncryptionConfiguration + KMS)
#
# CHECKING THIS FILE INTO GIT IS THE ANTI-PATTERN THE LAB IS TEACHING AGAINST.
# It is committed here only because a lab needs to be self-contained and this
# value protects nothing. See the production notes in the README for the three
# real options: Secrets Store CSI Driver, External Secrets Operator, and SOPS.
apiVersion: v1
kind: Secret
metadata:
  name: demo-secret
  namespace: lab-03-config
  labels:
    app.kubernetes.io/name: demo-secret
    app.kubernetes.io/instance: lab-03
    app.kubernetes.io/version: "1.0.0"
    app.kubernetes.io/component: backend
    app.kubernetes.io/part-of: kubernetes-labs
    app.kubernetes.io/managed-by: kubectl
type: Opaque
# stringData takes plaintext and the API server base64-encodes it on write. It
# is write-only: read the object back and you get a `data` field instead. Use
# it in manifests you write by hand - hand-encoding base64 is how typos with
# trailing newlines get shipped to production.
stringData:
  # Consumed as the API_KEY environment variable. The demo app never logs it;
  # /api/info exposes only a non-reversible fingerprint so you can confirm it
  # arrived without disclosing it.
  API_KEY: "lab03-demo-key-not-a-real-credential"
  # Consumed as a FILE at /etc/demo-secret/credentials.ini with mode 0400.
  # Mounting a secret is strictly better than an env var: env vars leak into
  # crash dumps, `kubectl describe pod`, child processes, and any library that
  # helpfully logs the environment on startup.
  credentials.ini: |
    [demo]
    api_key = lab03-demo-key-not-a-real-credential
    region = eu-west-1
    endpoint = https://demo.localtest.me
