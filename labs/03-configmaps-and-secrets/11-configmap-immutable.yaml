---
# An IMMUTABLE ConfigMap. Once created with immutable: true, the data and
# binaryData fields can never be edited - only the whole object deleted and
# recreated. Try `kubectl edit` on it and the API server rejects the update.
#
# Two reasons to reach for this in production:
#
#  1. Safety. Config that must change in lockstep with an image (schema
#     versions, feature-flag defaults baked into a release) cannot be drifted
#     out from under running pods by a well-meaning `kubectl edit`.
#
#  2. Scale. The kubelet watches every ConfigMap mounted by a pod on its node.
#     Marking one immutable lets the kubelet stop watching it entirely, which
#     measurably cuts API server load on large clusters.
#
# The usual pattern is to name immutable ConfigMaps with a content hash or
# version suffix (demo-build-info-v1, -v2, ...) and roll forward by creating a
# new one and updating the pod template to reference it - which conveniently
# also triggers a rollout, since the pod template changed.
apiVersion: v1
kind: ConfigMap
metadata:
  name: demo-build-info-v1
  namespace: lab-03-config
  labels:
    app.kubernetes.io/name: demo-build-info
    app.kubernetes.io/instance: lab-03
    app.kubernetes.io/version: "1.0.0"
    app.kubernetes.io/component: backend
    app.kubernetes.io/part-of: kubernetes-labs
    app.kubernetes.io/managed-by: kubectl
immutable: true
data:
  BUILD_VERSION: "1.0.0"
  BUILD_COMMIT: "a1b2c3d4e5f60718293a4b5c6d7e8f9012345678"
  BUILD_DATE: "2026-07-20T09:00:00Z"
