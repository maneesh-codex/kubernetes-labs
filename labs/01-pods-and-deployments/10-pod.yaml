---
# A BARE POD. Nothing owns it, nothing will recreate it.
#
# This manifest exists purely as a foil for 20-deployment.yaml. Delete this pod
# and it stays deleted; delete a Deployment-managed pod and the ReplicaSet
# controller rebuilds it within seconds. That contrast is the entire lesson of
# this lab, and it is why bare pods have essentially no place in production.
apiVersion: v1
kind: Pod
metadata:
  name: demo-bare
  namespace: lab-01-workloads
  labels:
    app.kubernetes.io/name: demo-bare
    app.kubernetes.io/instance: lab-01
    app.kubernetes.io/version: "1.0.0"
    app.kubernetes.io/component: frontend
    app.kubernetes.io/part-of: kubernetes-labs
    app.kubernetes.io/managed-by: kubectl
spec:
  # No controller means no rescheduling. If the node dies, so does this pod.
  restartPolicy: Always
  terminationGracePeriodSeconds: 30
  securityContext:
    runAsNonRoot: true
    runAsUser: 65532
    runAsGroup: 65532
    fsGroup: 65532
    seccompProfile:
      type: RuntimeDefault
  containers:
    - name: demo
      image: ghcr.io/maneeshm/k8s-labs-demo:1.0.0
      imagePullPolicy: IfNotPresent
      ports:
        - name: http
          containerPort: 8080
          protocol: TCP
      env:
        - name: GREETING
          value: "Hello from a bare Pod - nothing will resurrect me."
        - name: POD_NAME
          valueFrom:
            fieldRef:
              fieldPath: metadata.name
        - name: NODE_NAME
          valueFrom:
            fieldRef:
              fieldPath: spec.nodeName
        - name: POD_NAMESPACE
          valueFrom:
            fieldRef:
              fieldPath: metadata.namespace
      resources:
        requests:
          cpu: 50m
          memory: 64Mi
        limits:
          cpu: 200m
          memory: 128Mi
      livenessProbe:
        httpGet:
          path: /healthz
          port: http
        initialDelaySeconds: 5
        periodSeconds: 10
        timeoutSeconds: 2
        failureThreshold: 3
      readinessProbe:
        httpGet:
          path: /readyz
          port: http
        initialDelaySeconds: 3
        periodSeconds: 5
        timeoutSeconds: 2
        failureThreshold: 3
      securityContext:
        allowPrivilegeEscalation: false
        readOnlyRootFilesystem: true
        capabilities:
          drop:
            - ALL
