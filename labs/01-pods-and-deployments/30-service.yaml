---
apiVersion: v1
kind: Service
metadata:
  name: demo-web
  namespace: lab-01-workloads
  labels:
    app.kubernetes.io/name: demo-web
    app.kubernetes.io/instance: lab-01
    app.kubernetes.io/version: "1.0.0"
    app.kubernetes.io/component: frontend
    app.kubernetes.io/part-of: kubernetes-labs
    app.kubernetes.io/managed-by: kubectl
spec:
  type: ClusterIP
  # The selector deliberately omits the version label. If it matched on version
  # too, a rolling update would briefly have zero matching endpoints.
  selector:
    app.kubernetes.io/name: demo-web
    app.kubernetes.io/instance: lab-01
  ports:
    - name: http
      port: 80
      # Referring to the container port by NAME rather than number means the
      # container can move to a different port without touching the Service.
      targetPort: http
      protocol: TCP
