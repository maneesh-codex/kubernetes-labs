---
apiVersion: v1
kind: Namespace
metadata:
  name: lab-09-observability
  labels:
    app.kubernetes.io/name: lab-09-observability
    app.kubernetes.io/instance: lab-09
    app.kubernetes.io/version: "1.0.0"
    app.kubernetes.io/component: namespace
    app.kubernetes.io/part-of: kubernetes-labs
    app.kubernetes.io/managed-by: kubectl
    # The demo workload complies with the restricted Pod Security Standard, so
    # enforce it rather than merely documenting it.
    pod-security.kubernetes.io/enforce: restricted
    pod-security.kubernetes.io/enforce-version: latest
    pod-security.kubernetes.io/audit: restricted
    pod-security.kubernetes.io/warn: restricted
