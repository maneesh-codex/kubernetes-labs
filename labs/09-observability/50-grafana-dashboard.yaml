---
apiVersion: v1
kind: ConfigMap
metadata:
  name: demo-app-dashboard
  namespace: lab-09-observability
  labels:
    app.kubernetes.io/name: demo-app-dashboard
    app.kubernetes.io/instance: lab-09
    app.kubernetes.io/version: "1.0.0"
    app.kubernetes.io/component: dashboard
    app.kubernetes.io/part-of: kubernetes-labs
    app.kubernetes.io/managed-by: kubectl
    # DISCOVERY LABEL. The Grafana sidecar (grafana.sidecar.dashboards in
    # values-kube-prometheus-stack.yaml) watches every namespace for
    # ConfigMaps carrying grafana_dashboard="1" and copies their contents
    # into Grafana's provisioning directory. No UI clicking, no API call and
    # no Grafana restart required.
    #
    # This is the reason dashboards belong in git: one built by clicking
    # around the UI lives only in Grafana's SQLite database and disappears
    # with the pod. This one is recreated from source on every start.
    grafana_dashboard: "1"
  annotations:
    # Consumed by the sidecar's folderAnnotation setting, which files the
    # dashboard into a named Grafana folder instead of the root.
    grafana_folder: "kubernetes-labs"
data:
  # The key becomes the filename the sidecar writes, so it must end in .json.
  #
  # yamllint disable rule:line-length
  # Generated dashboard JSON. Grafana owns this schema, so it is reproduced
  # verbatim rather than reformatted to fit a line-length rule; a few PromQL
  # expressions run past 120 columns and breaking them would corrupt the JSON.
  demo-app.json: |
    {
      "annotations": {
        "list": [
          {
            "builtIn": 1,
            "datasource": {
              "type": "grafana",
              "uid": "-- Grafana --"
            },
            "enable": true,
            "hide": true,
            "iconColor": "rgba(0, 211, 255, 1)",
            "name": "Annotations & Alerts",
            "type": "dashboard"
          }
        ]
      },
      "description": "kubernetes-labs lab 09: golden signals for the demo application, built entirely from the metrics the app exposes on /metrics.",
      "editable": true,
      "fiscalYearStartMonth": 0,
      "graphTooltip": 1,
      "links": [],
      "panels": [
        {
          "datasource": {
            "type": "prometheus",
            "uid": "${datasource}"
          },
          "description": "Pods reporting demo_app_ready=1. Drops when POST /toggle-ready is called.",
          "fieldConfig": {
            "defaults": {
              "color": {
                "mode": "thresholds"
              },
              "mappings": [],
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {
                    "color": "red",
                    "value": null
                  },
                  {
                    "color": "orange",
                    "value": 1
                  },
                  {
                    "color": "green",
                    "value": 2
                  }
                ]
              },
              "unit": "short",
              "decimals": 0
            },
            "overrides": []
          },
          "gridPos": {
            "h": 5,
            "w": 6,
            "x": 0,
            "y": 0
          },
          "id": 1,
          "options": {
            "colorMode": "value",
            "graphMode": "area",
            "justifyMode": "auto",
            "orientation": "auto",
            "reduceOptions": {
              "calcs": [
                "lastNotNull"
              ],
              "fields": "",
              "values": false
            },
            "showPercentChange": false,
            "textMode": "auto",
            "wideLayout": true
          },
          "targets": [
            {
              "datasource": {
                "type": "prometheus",
                "uid": "${datasource}"
              },
              "editorMode": "code",
              "expr": "sum(demo_app_ready{namespace=\"lab-09-observability\"})",
              "legendFormat": "ready",
              "range": true,
              "refId": "A"
            }
          ],
          "title": "Ready replicas",
          "type": "stat"
        },
        {
          "datasource": {
            "type": "prometheus",
            "uid": "${datasource}"
          },
          "description": "Total requests per second across all pods, 5m window.",
          "fieldConfig": {
            "defaults": {
              "color": {
                "mode": "thresholds"
              },
              "mappings": [],
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {
                    "color": "blue",
                    "value": null
                  }
                ]
              },
              "unit": "reqps",
              "decimals": 2
            },
            "overrides": []
          },
          "gridPos": {
            "h": 5,
            "w": 6,
            "x": 6,
            "y": 0
          },
          "id": 2,
          "options": {
            "colorMode": "value",
            "graphMode": "area",
            "justifyMode": "auto",
            "orientation": "auto",
            "reduceOptions": {
              "calcs": [
                "lastNotNull"
              ],
              "fields": "",
              "values": false
            },
            "showPercentChange": false,
            "textMode": "auto",
            "wideLayout": true
          },
          "targets": [
            {
              "datasource": {
                "type": "prometheus",
                "uid": "${datasource}"
              },
              "editorMode": "code",
              "expr": "sum(rate(demo_app_http_requests_total{namespace=\"lab-09-observability\"}[5m]))",
              "legendFormat": "rps",
              "range": true,
              "refId": "A"
            }
          ],
          "title": "Request rate",
          "type": "stat"
        },
        {
          "datasource": {
            "type": "prometheus",
            "uid": "${datasource}"
          },
          "description": "99th percentile request latency. Alerts above 500ms.",
          "fieldConfig": {
            "defaults": {
              "color": {
                "mode": "thresholds"
              },
              "mappings": [],
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {
                    "color": "green",
                    "value": null
                  },
                  {
                    "color": "orange",
                    "value": 0.25
                  },
                  {
                    "color": "red",
                    "value": 0.5
                  }
                ]
              },
              "unit": "s",
              "decimals": 3
            },
            "overrides": []
          },
          "gridPos": {
            "h": 5,
            "w": 6,
            "x": 12,
            "y": 0
          },
          "id": 3,
          "options": {
            "colorMode": "value",
            "graphMode": "area",
            "justifyMode": "auto",
            "orientation": "auto",
            "reduceOptions": {
              "calcs": [
                "lastNotNull"
              ],
              "fields": "",
              "values": false
            },
            "showPercentChange": false,
            "textMode": "auto",
            "wideLayout": true
          },
          "targets": [
            {
              "datasource": {
                "type": "prometheus",
                "uid": "${datasource}"
              },
              "editorMode": "code",
              "expr": "histogram_quantile(0.99, sum by (le) ( rate(demo_app_http_request_duration_seconds_bucket{namespace=\"lab-09-observability\"}[5m])))",
              "legendFormat": "p99",
              "range": true,
              "refId": "A"
            }
          ],
          "title": "p99 latency",
          "type": "stat"
        },
        {
          "datasource": {
            "type": "prometheus",
            "uid": "${datasource}"
          },
          "description": "Fraction of responses with a 5xx status. Alerts above 5%.",
          "fieldConfig": {
            "defaults": {
              "color": {
                "mode": "thresholds"
              },
              "mappings": [],
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {
                    "color": "green",
                    "value": null
                  },
                  {
                    "color": "orange",
                    "value": 0.01
                  },
                  {
                    "color": "red",
                    "value": 0.05
                  }
                ]
              },
              "unit": "percentunit",
              "decimals": 3
            },
            "overrides": []
          },
          "gridPos": {
            "h": 5,
            "w": 6,
            "x": 18,
            "y": 0
          },
          "id": 4,
          "options": {
            "colorMode": "value",
            "graphMode": "area",
            "justifyMode": "auto",
            "orientation": "auto",
            "reduceOptions": {
              "calcs": [
                "lastNotNull"
              ],
              "fields": "",
              "values": false
            },
            "showPercentChange": false,
            "textMode": "auto",
            "wideLayout": true
          },
          "targets": [
            {
              "datasource": {
                "type": "prometheus",
                "uid": "${datasource}"
              },
              "editorMode": "code",
              "expr": "sum(rate(demo_app_http_requests_total{namespace=\"lab-09-observability\",status=~\"5..\"}[5m])) / clamp_min(sum(rate(demo_app_http_requests_total{namespace=\"lab-09-observability\"}[5m])), 0.001)",
              "legendFormat": "error ratio",
              "range": true,
              "refId": "A"
            }
          ],
          "title": "5xx error ratio",
          "type": "stat"
        },
        {
          "datasource": {
            "type": "prometheus",
            "uid": "${datasource}"
          },
          "description": "sum by (path, status) of rate(demo_app_http_requests_total[5m]). Summing away the pod label gives service-level throughput; add pod back to spot an unbalanced replica.",
          "fieldConfig": {
            "defaults": {
              "color": {
                "mode": "palette-classic"
