        {
          "datasource": {
            "type": "prometheus",
            "uid": "${datasource}"
          },
          "description": "demo_app_build_info is an 'info' metric: its value is always 1 and all the meaning lives in the labels. Joining on it with '* on(pod) group_left(version)' is how you break any other graph down by release version.",
          "fieldConfig": {
            "defaults": {
              "custom": {
                "align": "auto",
                "cellOptions": {
                  "type": "auto"
