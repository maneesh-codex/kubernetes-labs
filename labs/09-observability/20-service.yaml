---
apiVersion: v1
kind: Service
metadata:
  name: demo-metrics
  namespace: lab-09-observability
  labels:
    app.kubernetes.io/name: demo-metrics
    app.kubernetes.io/instance: lab-09
    app.kubernetes.io/version: "1.0.0"
    app.kubernetes.io/component: web
    app.kubernetes.io/part-of: kubernetes-labs
    app.kubernetes.io/managed-by: kubectl
spec:
  type: ClusterIP
  ports:
    # NAMED PORT. This is the single most important line in the lab.
    #
    # A ServiceMonitor's `endpoints[].port` field takes a Service port NAME, not
    # a number. Kubernetes lets you omit `name` when a Service has only one
    # port, and everything else keeps working -- DNS resolves, curl succeeds,
    # the Ingress routes. Only Prometheus breaks, and it breaks by showing zero
    # targets with no event, no warning and nothing in any log.
    #
    # If a target is missing, check this first.
    - name: http
      port: 8080
      targetPort: http
      protocol: TCP
  selector:
    app.kubernetes.io/name: demo-metrics
    app.kubernetes.io/instance: lab-09
