---
# The same StatefulSet guarantees as the postgres one, on a workload simple
# enough to see them clearly - and, unlike postgres, this one keeps
# readOnlyRootFilesystem: true throughout. A mounted PersistentVolume is a
# separate filesystem, so a container can hold an immutable root AND write to
# its volume. Those two settings are orthogonal, which is the point of
# including this alongside the postgres exception.
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: demo-sts
  namespace: lab-04-storage
  labels:
    app.kubernetes.io/name: demo-sts
    app.kubernetes.io/instance: lab-04
    app.kubernetes.io/version: "1.0.0"
    app.kubernetes.io/component: backend
    app.kubernetes.io/part-of: kubernetes-labs
    app.kubernetes.io/managed-by: kubectl
spec:
  serviceName: demo-sts
  replicas: 3
  revisionHistoryLimit: 5
  minReadySeconds: 5
  podManagementPolicy: OrderedReady
  selector:
    matchLabels:
      app.kubernetes.io/name: demo-sts
      app.kubernetes.io/instance: lab-04
  updateStrategy:
    type: RollingUpdate
    rollingUpdate:
      partition: 0
  persistentVolumeClaimRetentionPolicy:
    whenDeleted: Retain
    whenScaled: Retain
  template:
    metadata:
      labels:
        app.kubernetes.io/name: demo-sts
        app.kubernetes.io/instance: lab-04
        app.kubernetes.io/version: "1.0.0"
        app.kubernetes.io/component: backend
        app.kubernetes.io/part-of: kubernetes-labs
        app.kubernetes.io/managed-by: kubectl
    spec:
      terminationGracePeriodSeconds: 30
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        runAsGroup: 65532
        fsGroup: 65532
        fsGroupChangePolicy: OnRootMismatch
        seccompProfile:
          type: RuntimeDefault
      volumes:
        - name: tmp
          emptyDir:
            medium: Memory
            sizeLimit: 16Mi
      initContainers:
        # Writes each pod's identity to ITS OWN volume and prints the whole
        # history. Because each ordinal keeps its own PVC forever, the log in
        # demo-sts-0 only ever names demo-sts-0. Delete the pod and the
        # replacement appends a second line to the SAME file - proving the
        # volume followed the ordinal, not the pod instance.
        - name: record-identity
          image: busybox:1.36
          imagePullPolicy: IfNotPresent
          command:
            - /bin/sh
            - -c
            - |
              set -eu
              echo "$(date -Iseconds) pod=${POD_NAME} node=${NODE_NAME} dns=${POD_NAME}.demo-sts" \
                >> /data/identity.log
              echo "--- /data/identity.log for ${POD_NAME} ---"
              cat /data/identity.log
          env:
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
          volumeMounts:
            - name: data
              mountPath: /data
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
      containers:
        - name: demo
          image: ghcr.io/maneeshm/k8s-labs-demo:1.0.0
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          env:
            - name: GREETING
              value: "StatefulSet member with a per-ordinal PVC mounted at /data"
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
          volumeMounts:
            - name: data
              mountPath: /data
            - name: tmp
              mountPath: /tmp
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
          startupProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 0
            periodSeconds: 3
            timeoutSeconds: 2
            failureThreshold: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 2
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 3
            periodSeconds: 5
            timeoutSeconds: 2
            failureThreshold: 3
          securityContext:
            allowPrivilegeEscalation: false
            # Stays TRUE even though this container writes to /data. The
            # volume is its own filesystem and is unaffected by the read-only
            # root. Contrast with the postgres container, which needs a
            # writable root for reasons that have nothing to do with its data.
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
  volumeClaimTemplates:
    - metadata:
        name: data
        labels:
          app.kubernetes.io/name: demo-sts
          app.kubernetes.io/instance: lab-04
          app.kubernetes.io/version: "1.0.0"
          app.kubernetes.io/component: backend
          app.kubernetes.io/part-of: kubernetes-labs
          app.kubernetes.io/managed-by: kubectl
      spec:
        accessModes:
          - ReadWriteOnce
        storageClassName: lab-local-path
        resources:
          requests:
            storage: 1Gi
