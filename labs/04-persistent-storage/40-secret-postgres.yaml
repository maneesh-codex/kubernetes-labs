---
# Lab-only credential. See lab 03 for why a Secret in Git is an anti-pattern
# and what to do instead (Secrets Store CSI Driver, External Secrets Operator,
# SOPS). This value protects nothing and exists so the lab is self-contained.
apiVersion: v1
kind: Secret
metadata:
  name: postgres-credentials
  namespace: lab-04-storage
  labels:
    app.kubernetes.io/name: postgres
    app.kubernetes.io/instance: lab-04
    app.kubernetes.io/version: "1.0.0"
    app.kubernetes.io/component: database
    app.kubernetes.io/part-of: kubernetes-labs
    app.kubernetes.io/managed-by: kubectl
type: Opaque
stringData:
  POSTGRES_DB: demo
  POSTGRES_USER: demo
  POSTGRES_PASSWORD: "lab04-demo-password-not-a-real-credential"
