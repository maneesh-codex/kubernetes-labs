---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: demo-app
  namespace: lab-06-autoscaling
  labels:
    app.kubernetes.io/name: demo-app
    app.kubernetes.io/instance: lab-06
    app.kubernetes.io/version: "1.0.0"
    app.kubernetes.io/component: backend
    app.kubernetes.io/part-of: kubernetes-labs
    app.kubernetes.io/managed-by: kubectl
spec:
  # NOTE: `replicas` is intentionally set here for the initial apply, but once
  # the HPA takes ownership of this field you must STOP managing it. Re-applying
  # a manifest with a hard-coded replica count fights the HPA and causes a
  # scale-down-then-scale-up flap. In GitOps (lab 10) the fix is to add
  # `.spec.replicas` to Argo CD's ignoreDifferences, or drop the field entirely
  # after the first apply.
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: demo-app
      app.kubernetes.io/instance: lab-06
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  template:
    metadata:
      labels:
        app.kubernetes.io/name: demo-app
        app.kubernetes.io/instance: lab-06
        app.kubernetes.io/version: "1.0.0"
        app.kubernetes.io/component: backend
        app.kubernetes.io/part-of: kubernetes-labs
        app.kubernetes.io/managed-by: kubectl
    spec:
      # Spread replicas across nodes so that scaling out actually buys you
      # availability rather than a bigger pile of Pods on one node.
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app.kubernetes.io/name: demo-app
              app.kubernetes.io/instance: lab-06
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        runAsGroup: 65532
        fsGroup: 65532
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: demo-app
          image: ghcr.io/maneeshm/k8s-labs-demo:1.0.0
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          env:
            - name: GREETING
              value: "Hello from lab 06 - scale me."
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
          # ------------------------------------------------------------------
          # WHY THIS LAB DEVIATES FROM THE REPO-WIDE 50m/200m DEFAULT
          # ------------------------------------------------------------------
          # The HPA computes:
          #
          #     desiredReplicas = ceil( currentReplicas *
          #                             currentMetricValue / desiredMetricValue )
          #
          # where for `type: Utilization` the metric value is
          # (actual CPU used) / (CPU **requested**) x 100. The REQUEST is the
          # denominator - the limit is irrelevant to the HPA. Three consequences:
          #
          #  1. A 100m request makes the arithmetic legible. At a 60% target the
          #     per-Pod trigger is 60m of CPU: a single `/burn` request pins one
          #     core (1000m), so utilisation jumps to ~1000% and the HPA scales
          #     hard and visibly. With the repo default of 50m the numbers are
          #     the same shape but the percentages are absurd (2000%) and the
          #     Pod is throttled so aggressively that /burn takes forever.
          #  2. The 500m limit gives each Pod real headroom to *show* load. With
          #     a 200m limit, cgroup CPU throttling caps observed usage at 200m,
          #     so utilisation flat-lines at 200% no matter how much work
          #     arrives - the HPA under-reacts and the demo is unconvincing.
          #     This is a real production failure mode, not a lab artefact:
          #     tight CPU limits mask demand from the HPA.
          #  3. Requests are also what the scheduler and Cluster Autoscaler use.
          #     Requesting 100m per Pod at maxReplicas 10 means 1000m of
          #     guaranteed CPU must be schedulable - on a small kind cluster you
          #     will see Pods go Pending near the top of the range, which is
          #     precisely the signal a Cluster Autoscaler would act on.
          #
          # Rule of thumb for real systems: set requests to roughly the p50-p90
          # steady-state usage, set the HPA target to ~60-70% of that, and be
          # very careful with CPU limits (many teams omit them entirely and rely
          # on requests + a LimitRange).
          resources:
            requests:
              cpu: 100m
              memory: 64Mi
            limits:
              cpu: 500m
              memory: 128Mi
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 2
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 3
            periodSeconds: 5
            timeoutSeconds: 2
            failureThreshold: 3
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir:
            medium: Memory
            sizeLimit: 16Mi
